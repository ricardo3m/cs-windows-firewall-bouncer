name: Build
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
jobs:
    build:
      runs-on: windows-latest
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      steps:
        - name: setup dotnet
          uses: actions/setup-dotnet@v4
        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: 17
            distribution: 'zulu' # Alternative distribution options are available.
        - name: Add msbuild to PATH
          uses: microsoft/setup-msbuild@v2
          with:
            msbuild-architecture: x64
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
        - name: Cache SonarCloud packages
          uses: actions/cache@v4
          with:
            path: ~\sonar\cache
            key: ${{ runner.os }}-sonar
            restore-keys: ${{ runner.os }}-sonar
        - name: Cache SonarCloud scanner
          id: cache-sonar-scanner
          uses: actions/cache@v4
          with:
            path: .\.sonar\scanner
            key: ${{ runner.os }}-sonar-scanner
            restore-keys: ${{ runner.os }}-sonar-scanner
        - name: Install SonarCloud scanner
          if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
          shell: powershell
          run: |
            New-Item -Path .\.sonar\scanner -ItemType Directory
            dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner
        - run: "nuget restore ${env:GITHUB_WORKSPACE}\\cs-windows-firewall-bouncer.sln"
        - name: SonarCloud begin
          if: ${{ github.actor != 'dependabot[bot]' && env.SONAR_TOKEN != '' }}
          continue-on-error: true
          env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          shell: powershell
          run: |
            .\.sonar\scanner\dotnet-sonarscanner begin /k:"crowdsecurity_cs-windows-firewall-bouncer" /o:"crowdsecurity" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="https://sonarcloud.io"
        - name: Build
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          shell: powershell
          run: |
            msbuild ${env:GITHUB_WORKSPACE}\\cs-windows-firewall-bouncer.sln -t:cs-windows-firewall-bouncer:rebuild -property:Configuration=Release
        - name: SonarCloud end
          if: ${{ github.actor != 'dependabot[bot]' && env.SONAR_TOKEN != '' }}
          continue-on-error: true
          env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          shell: powershell
          run: |
            .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
        - name: Run tests
          shell: powershell
          run: |
            dotnet test ${env:GITHUB_WORKSPACE}\\cs-windows-firewall-bouncer-tests\\cs-windows-firewall-bouncer-tests.csproj --configuration Release --logger trx
        - name: Upload artifact
          uses: actions/upload-artifact@v4
          with:
            name: cs_windows_firewall_bouncer_2026
            path: cs-windows-firewall-bouncer\bin\**\net8.0-windows\
            if-no-files-found: error